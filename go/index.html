<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="../favicon.ico" />
    <title>Bitsports – Go</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #050816;
        color: #f9fafb;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      #ui {
        position: fixed;
        top: 0.75rem;
        left: 0.75rem;
        padding: 0.5rem 0.75rem 0.75rem 0.75rem;
        background: rgba(15, 23, 42, 0.9);
        border-radius: 0.5rem;
        box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        z-index: 10;
        backdrop-filter: blur(10px);
        max-width: 260px;
      }
      #ui-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
      }
      #ui h1 {
        margin: 0;
        font-size: 1rem;
      }
      #ui h1 a { color: inherit; text-decoration: none; }
      a { color: #f9fafb; }
      #ui-toggle {
        border: none;
        background: rgba(15, 23, 42, 0.9);
        color: #e5e7eb;
        border-radius: 999px;
        padding: 0.15rem 0.5rem;
        font-size: 0.75rem;
        cursor: pointer;
      }
      #ui label {
        display: block;
        font-size: 0.8rem;
        margin-top: 0.25rem;
      }
      #ui select, #ui button {
        margin-top: 0.25rem;
        width: 100%;
        font-size: 0.8rem;
        background: #1e293b;
        color: #f1f5f9;
        border: 1px solid #334155;
        border-radius: 0.375rem;
        padding: 0.4rem 0.5rem;
        cursor: pointer;
      }
      #ui select:hover, #ui button:hover { background: #334155; }
      #ui select:focus, #ui button:focus { outline: none; border-color: #38bdf8; }
      #ui select option { background: #1e293b; color: #f1f5f9; }
      #ui button:disabled { opacity: 0.4; cursor: not-allowed; }
      #ui button:disabled:hover { background: #1e293b; }

      .btn-row {
        display: flex;
        gap: 0.25rem;
        margin-top: 0.25rem;
      }
      .btn-row button {
        margin-top: 0;
        flex: 1;
      }

      #score {
        margin-top: 0.75rem;
        font-size: 0.85rem;
        font-weight: 600;
        text-align: center;
        padding: 0.4rem 0.5rem;
        background: #0f172a;
        border-radius: 0.375rem;
        letter-spacing: 0.025em;
        line-height: 1.6;
      }
      .score-black { color: #e2e8f0; }
      .score-white { color: #94a3b8; }
      .score-sep { color: #64748b; margin: 0 0.25rem; }
      #status-line {
        margin-top: 0.4rem;
        font-size: 0.75rem;
        text-align: center;
        color: #94a3b8;
        min-height: 1rem;
      }

      #ui.collapsed { padding: 0.35rem 0.6rem; background: rgba(15, 23, 42, 0.5); }
      #ui.collapsed #ui-body { display: none; }
      #ui.collapsed h1 { font-size: 0.85rem; }
      #ui.collapsed #ui-toggle { font-size: 0.7rem; }

      @media (max-width: 640px) { #ui { max-width: 220px; } }

      #canvas-container { width: 100vw; height: 100vh; }

      /* Cinematic Mode */
      .cinematic-mode #ui {
        display: none !important;
      }
      #cinematic-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        pointer-events: none;
        z-index: 100;
      }
      .cinematic-mode #cinematic-overlay {
        display: block;
      }
      #cinematic-black-name {
        position: absolute;
        left: 2rem;
        top: 60%;
        color: #e2e8f0;
        font-size: 1.5rem;
        font-weight: 600;
        text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        writing-mode: vertical-rl;
        text-orientation: mixed;
        transform: translateY(-50%) rotate(180deg);
      }
      #cinematic-white-name {
        position: absolute;
        right: 2rem;
        top: 60%;
        color: #94a3b8;
        font-size: 1.5rem;
        font-weight: 600;
        text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        writing-mode: vertical-rl;
        text-orientation: mixed;
        transform: translateY(-50%);
      }
      #cinematic-black-cap {
        position: absolute;
        left: 2rem;
        top: 15%;
        color: #e2e8f0;
        font-size: 2.5rem;
        font-weight: 700;
        text-shadow: 0 2px 10px rgba(0,0,0,0.8);
      }
      #cinematic-white-cap {
        position: absolute;
        right: 2rem;
        top: 15%;
        color: #94a3b8;
        font-size: 2.5rem;
        font-weight: 700;
        text-shadow: 0 2px 10px rgba(0,0,0,0.8);
      }
      #cinematic-hint {
        position: absolute;
        bottom: 1rem;
        right: 1rem;
        font-size: 0.75rem;
        color: rgba(255,255,255,0.3);
        display: none;
      }
      #cinematic-countdown {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 8rem;
        font-weight: 700;
        color: #fff;
        text-shadow: 0 0 40px rgba(255,255,255,0.5), 0 4px 20px rgba(0,0,0,0.8);
        display: none;
      }
      #cinematic-countdown.active {
        display: block;
        animation: countdownPulse 1s ease-in-out infinite;
      }
      @keyframes countdownPulse {
        0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
        50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.8; }
      }
    </style>
  </head>
  <body>
    <div id="ui">
      <div id="ui-header">
        <h1><a href="../" >Bitsports – Go</a></h1>
        <button id="ui-toggle" type="button">Hide</button>
      </div>
      <div id="ui-body">
        <label for="black-ai">Black (●)</label>
        <select id="black-ai"></select>

        <label for="white-ai">White (○)</label>
        <select id="white-ai"></select>

        <button id="start-btn">Start Game</button>

        <div class="btn-row">
          <button id="pass-btn" disabled>Pass</button>
          <button id="resign-btn" disabled>Resign</button>
        </div>

        <div id="score">
          <span class="score-black">● 0</span>
          <span class="score-sep">cap</span>
          <span class="score-white">0 ○</span>
        </div>
        <div id="status-line">Press Start Game</div>
      </div>
    </div>

    <div id="canvas-container"></div>

    <!-- Cinematic Mode Overlay -->
    <div id="cinematic-overlay">
      <span id="cinematic-black-cap">●</span>
      <span id="cinematic-black-name">Black</span>
      <span id="cinematic-white-name">White</span>
      <span id="cinematic-white-cap">○</span>
      <div id="cinematic-countdown"></div>
      <div id="cinematic-hint">Press C to exit</div>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
